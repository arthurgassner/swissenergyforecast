name: swissenergyforecast

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env.override
    container_name: swissenergyforecast-backend
    volumes:
      - swissenergyforecast-backend-data:/src/data
    networks:
      - swissenergyforecast-net

  frontend:
    depends_on:
      - backend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: swissenergyforecast-frontend
    networks:
      - swissenergyforecast-net

volumes:
  swissenergyforecast-backend-data:
    name: swissenergyforecast-backend-data

networks:
  swissenergyforecast-net:
    driver: bridge
